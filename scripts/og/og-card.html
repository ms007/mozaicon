<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
      }

      .card {
        width: 1200px;
        height: 630px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 96px;
        font-family: 'Inter', system-ui, sans-serif;
        color: #f5f2ff;
        background:
          radial-gradient(1100px 700px at 100% 0%, rgba(134, 59, 255, 0.45), transparent 60%),
          radial-gradient(900px 600px at 0% 100%, rgba(71, 191, 255, 0.25), transparent 55%),
          #0e0a1a;
        position: relative;
        overflow: hidden;
      }

      .badge {
        position: absolute;
        top: 64px;
        right: 80px;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: rgba(237, 230, 255, 0.7);
        text-transform: uppercase;
      }

      .logo {
        width: 132px;
        height: auto;
        margin-bottom: 48px;
        filter: drop-shadow(0 12px 40px rgba(134, 59, 255, 0.55));
      }

      h1 {
        font-size: 116px;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      p {
        margin-top: 28px;
        font-size: 40px;
        font-weight: 400;
        line-height: 1.3;
        max-width: 880px;
        color: rgba(237, 230, 255, 0.82);
      }

      .url {
        margin-top: 56px;
        font-size: 30px;
        font-weight: 600;
        color: #b896ff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">SVG Icon Editor</span>
      <img class="logo" src="../../public/favicon.svg" alt="" />
      <h1>Mozaicon</h1>
      <p>Pixel-perfect icon design with a keyboard-first workflow and instant SVG export.</p>
      <div class="url">mozaicon.com</div>
    </div>
  </body>
</html>
